<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>תרומה · הבית · הקהילה הישראלית בוינה</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Frank+Ruhl+Libre:wght@400;500;700;900&family=Heebo:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #FAF6F0;
  --bg-warm: #F2EBDF;
  --card: #FFFFFF;
  --gold: #C9A84C;
  --gold-soft: #E8D5B7;
  --gold-deep: #B08F32;
  --gold-bright: #F2D26B;
  --gold-glow: #FFE89A;
  --burgundy: #8B1A1A;
  --burgundy-soft: #A83838;
  --ink: #1C1817;
  --ink-soft: #4A4441;
  --muted: #8A827C;
  --muted-soft: #A39A92;
  --line: #E8E0D2;
  --shadow-soft: 0 1px 2px rgba(28, 24, 23, 0.04), 0 8px 24px rgba(28, 24, 23, 0.06);
  --shadow-card: 0 1px 3px rgba(28, 24, 23, 0.05), 0 12px 40px rgba(28, 24, 23, 0.08);
  --serif: 'Frank Ruhl Libre', serif;
  --sans: 'Heebo', system-ui, sans-serif;
  --ease: cubic-bezier(0.22, 1, 0.36, 1);
}
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body {
  height: 100%; width: 100%; overflow: hidden;
  background: var(--bg); color: var(--ink);
  font-family: var(--sans);
  -webkit-font-smoothing: antialiased;
}
body::before {
  content: ''; position: fixed; inset: 0;
  background-image:
    radial-gradient(ellipse 80% 50% at 50% -10%, rgba(201, 168, 76, 0.08), transparent 60%),
    radial-gradient(ellipse 60% 40% at 100% 100%, rgba(139, 26, 26, 0.04), transparent 60%),
    radial-gradient(ellipse 60% 40% at 0% 100%, rgba(201, 168, 76, 0.05), transparent 60%);
  pointer-events: none; z-index: 0;
}
.app {
  position: relative; z-index: 2;
  height: 100dvh; width: 100%;
  display: grid; grid-template-rows: 1fr auto;
  padding: clamp(14px, 2.5vh, 28px) clamp(16px, 4vw, 40px) clamp(12px, 2vh, 20px);
}

/* WELCOME */
.welcome-screen {
  position: fixed; inset: 0; z-index: 50;
  background: var(--bg);
  display: grid; place-items: center;
  opacity: 1;
  transition: opacity 0.7s var(--ease), visibility 0s 0.7s;
}
.welcome-screen.hide { opacity: 0; visibility: hidden; }
.welcome-screen::before {
  content: ''; position: absolute; inset: 0;
  background-image:
    radial-gradient(ellipse 70% 50% at 50% 20%, rgba(201, 168, 76, 0.12), transparent 60%),
    radial-gradient(ellipse 50% 40% at 50% 100%, rgba(139, 26, 26, 0.06), transparent 60%);
  pointer-events: none;
}
.welcome-content {
  text-align: center; padding: 0 24px;
  max-width: 540px; position: relative; z-index: 2;
}
.welcome-logo {
  width: clamp(140px, 22vh, 220px);
  margin: 0 auto 28px; opacity: 0;
  transform: translateY(10px) scale(0.95);
  animation: welcomeLogo 1.1s var(--ease) 0.2s forwards;
}
.welcome-logo img {
  width: 100%; height: auto;
  filter: drop-shadow(0 8px 24px rgba(176, 143, 50, 0.2));
}
@keyframes welcomeLogo { to { opacity: 1; transform: translateY(0) scale(1); } }
.welcome-title {
  font-family: var(--serif);
  font-size: clamp(18px, 2.6vh, 22px);
  font-weight: 400; color: var(--ink-soft);
  line-height: 1.5; margin-bottom: 8px;
  opacity: 0; transform: translateY(8px);
  animation: welcomeRise 0.8s var(--ease) 0.6s forwards;
}
.welcome-name {
  font-family: var(--serif);
  font-size: clamp(36px, 6.5vh, 60px);
  font-weight: 700; color: var(--ink);
  line-height: 1; margin: 4px 0 18px;
  letter-spacing: -0.01em;
  opacity: 0; transform: translateY(8px);
  animation: welcomeRise 0.8s var(--ease) 0.85s forwards;
  position: relative; display: inline-block;
}
.welcome-name::before, .welcome-name::after {
  content: ''; position: absolute; top: 50%;
  width: 30px; height: 1px;
  background: var(--gold); opacity: 0;
  animation: lineDraw 0.6s var(--ease) 1.4s forwards;
}
.welcome-name::before { right: calc(100% + 18px); }
.welcome-name::after { left: calc(100% + 18px); }
@keyframes lineDraw { to { opacity: 0.8; } }
.welcome-tagline {
  font-family: var(--sans);
  font-size: clamp(13px, 1.7vh, 15px);
  color: var(--muted); font-weight: 400;
  opacity: 0; transform: translateY(8px);
  animation: welcomeRise 0.8s var(--ease) 1.2s forwards;
}
@keyframes welcomeRise { to { opacity: 1; transform: translateY(0); } }
.welcome-progress {
  width: 60px; height: 2px;
  background: var(--line);
  border-radius: 2px; margin: 28px auto 0;
  overflow: hidden; opacity: 0;
  animation: welcomeRise 0.4s var(--ease) 1.5s forwards;
}
.welcome-progress::before {
  content: ''; display: block; height: 100%;
  background: linear-gradient(90deg, var(--gold), var(--gold-deep));
  width: 0;
  animation: welcomeFill 1.3s var(--ease) 1.5s forwards;
}
@keyframes welcomeFill { to { width: 100%; } }

/* STAGE */
.stage {
  display: grid; place-items: center;
  padding: 12px 0; min-height: 0;
  opacity: 0;
  transition: opacity 0.6s var(--ease);
}
.stage.show { opacity: 1; }
.card {
  width: 100%; max-width: 580px;
  background: var(--card); border-radius: 20px;
  padding: clamp(20px, 3vh, 36px) clamp(20px, 4vw, 38px);
  box-shadow: var(--shadow-card);
  position: relative; border: 1px solid var(--line);
}
.card::before, .card::after {
  content: ''; position: absolute;
  width: 24px; height: 24px;
  border: 1px solid var(--gold);
  opacity: 0.4; pointer-events: none;
}
.card::before {
  top: 12px; right: 12px;
  border-bottom: none; border-left: none;
  border-top-right-radius: 12px;
}
.card::after {
  bottom: 12px; left: 12px;
  border-top: none; border-right: none;
  border-bottom-left-radius: 12px;
}
.step-header {
  margin-bottom: clamp(16px, 2.5vh, 24px);
  text-align: center;
}
.step-title {
  font-family: var(--serif);
  font-size: clamp(19px, 2.6vh, 24px);
  font-weight: 600; line-height: 1.3;
  color: var(--ink); letter-spacing: -0.005em;
}
.step-title .accent { color: var(--burgundy); }
.divider {
  width: 32px; height: 1px;
  background: var(--gold);
  margin: 12px auto 0;
  position: relative;
}
.divider::before, .divider::after {
  content: ''; position: absolute; top: 50%;
  width: 4px; height: 4px;
  border-radius: 50%; background: var(--gold);
  transform: translateY(-50%);
}
.divider::before { right: -8px; }
.divider::after { left: -8px; }
.steps { position: relative; min-height: 200px; }
.step {
  position: absolute; inset: 0;
  opacity: 0; visibility: hidden;
  transform: translateY(8px);
  transition: opacity 0.4s var(--ease), transform 0.4s var(--ease), visibility 0s 0.4s;
}
.step.active {
  opacity: 1; visibility: visible;
  transform: translateY(0);
  transition: opacity 0.5s var(--ease) 0.1s, transform 0.5s var(--ease) 0.1s, visibility 0s;
  position: relative;
}

/* STEP 1: CURRENCY - VERTICAL STACK */
.currency-grid {
  display: grid;
  grid-template-columns: 1fr;
  gap: 10px;
  max-width: 380px;
  margin: 0 auto;
}
.currency-btn {
  background: var(--card);
  border: 1.5px solid var(--line);
  border-radius: 14px;
  padding: 14px 20px;
  cursor: pointer;
  transition: all 0.35s var(--ease);
  font-family: var(--sans);
  position: relative;
  overflow: hidden;
  display: grid;
  grid-template-columns: auto 1fr auto;
  align-items: center;
  gap: 16px;
  text-align: right;
  min-height: 64px;
}
.currency-btn:hover {
  border-color: var(--gold-soft);
  background: var(--bg-warm);
}
.currency-btn.selected {
  border-color: var(--gold);
  background: linear-gradient(180deg, #FFFCF5 0%, #FFF8E8 100%);
  box-shadow: 0 0 0 3px rgba(201, 168, 76, 0.15), 0 8px 20px rgba(201, 168, 76, 0.18);
}
.currency-grid.has-selection .currency-btn:not(.selected) {
  transform: scale(0.94);
  opacity: 0.55;
  padding: 10px 18px;
  min-height: 52px;
}
.currency-symbol {
  font-family: var(--serif);
  font-size: clamp(28px, 3.5vh, 34px);
  font-weight: 600; color: var(--ink);
  line-height: 1;
  unicode-bidi: isolate;
  transition: all 0.3s var(--ease);
}
.currency-btn.selected .currency-symbol { color: var(--gold-deep); }
.currency-grid.has-selection .currency-btn:not(.selected) .currency-symbol {
  font-size: clamp(22px, 2.8vh, 26px);
}
.currency-name {
  font-size: clamp(14px, 1.7vh, 15px);
  color: var(--ink); font-weight: 500;
  text-align: right;
}
.currency-tax {
  font-size: clamp(10px, 1.2vh, 11px);
  color: var(--muted); font-weight: 500;
  letter-spacing: 0.04em;
  unicode-bidi: isolate;
  text-align: left;
}

/* STEP 2: FREQUENCY */
.freq-row {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 10px;
  margin-top: 8px;
}
.freq-btn {
  background: var(--card);
  border: 1.5px solid var(--line);
  border-radius: 12px;
  padding: 14px 10px;
  cursor: pointer;
  transition: all 0.3s var(--ease);
  font-family: var(--sans);
  font-size: 13px;
  font-weight: 600;
  color: var(--ink);
  position: relative;
  overflow: hidden;
}
.freq-btn:hover {
  border-color: var(--gold-soft);
  background: var(--bg-warm);
}
.freq-btn.selected {
  border-color: var(--gold);
  background: linear-gradient(180deg, #FFFCF5 0%, #FFF8E8 100%);
  color: var(--gold-deep);
  box-shadow: 0 0 0 3px rgba(201, 168, 76, 0.15);
}
.freq-row.has-selection .freq-btn:not(.selected) {
  transform: scale(0.94);
  opacity: 0.55;
  padding: 10px 8px;
}
.freq-btn-title {
  display: block;
  font-size: 14px;
  margin-bottom: 2px;
  position: relative;
  z-index: 2;
}
.freq-btn-sub {
  display: block;
  font-size: 10.5px;
  font-weight: 400;
  color: var(--muted);
  position: relative;
  z-index: 2;
}
.freq-btn.selected .freq-btn-sub {
  color: var(--gold-deep);
  opacity: 0.8;
}

/* GOLD SPARK - traveling on the border */
.freq-btn.recommended { position: relative; }
.freq-btn.recommended .spark-svg {
  position: absolute; inset: 0;
  width: 100%; height: 100%;
  pointer-events: none;
  border-radius: 12px;
  z-index: 1;
}
.freq-btn.recommended .spark-svg .spark-path {
  fill: none;
  stroke: var(--gold-bright);
  stroke-width: 2;
  stroke-linecap: round;
  stroke-dasharray: 12 1000;
  stroke-dashoffset: 0;
  filter: drop-shadow(0 0 4px var(--gold-glow)) drop-shadow(0 0 8px rgba(242, 210, 107, 0.5));
  animation: sparkTravel 3.5s linear infinite;
}
@keyframes sparkTravel {
  from { stroke-dashoffset: 0; }
  to { stroke-dashoffset: -1012; }
}

/* AMOUNT */
.amount-section {
  max-height: 0;
  opacity: 0;
  overflow: hidden;
  margin-top: 0;
  transition: max-height 0.45s var(--ease), opacity 0.4s var(--ease), margin-top 0.4s var(--ease);
}
.amount-section.show {
  max-height: 700px;
  opacity: 1;
  margin-top: 14px;
}
.amount-grid {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 10px;
}
.amount-btn {
  background: var(--card);
  border: 1.5px solid var(--line);
  border-radius: 12px;
  padding: 12px 10px;
  cursor: pointer;
  transition: all 0.3s var(--ease);
  font-family: var(--serif);
  color: var(--ink);
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 2px;
}
.amount-btn:hover {
  border-color: var(--gold-soft);
  background: var(--bg-warm);
}
.amount-btn.selected {
  border-color: var(--gold);
  background: linear-gradient(180deg, #FFFCF5 0%, #FFF8E8 100%);
  box-shadow: 0 0 0 3px rgba(201, 168, 76, 0.15);
}
.amount-grid.has-selection .amount-btn:not(.selected):not(.amount-custom) {
  transform: scale(0.92);
  opacity: 0.5;
  padding: 9px 8px;
}
.amount-primary {
  font-family: var(--serif);
  font-size: clamp(20px, 2.6vh, 24px);
  font-weight: 600;
  unicode-bidi: isolate;
  color: var(--ink);
  line-height: 1.1;
  transition: all 0.3s var(--ease);
}
.amount-btn.selected .amount-primary { color: var(--gold-deep); }
.amount-grid.has-selection .amount-btn:not(.selected):not(.amount-custom) .amount-primary {
  font-size: clamp(16px, 2.2vh, 19px);
}
.amount-secondary {
  font-family: var(--sans);
  font-size: 10.5px;
  color: var(--muted);
  unicode-bidi: isolate;
}
.exchange-note {
  text-align: center;
  font-size: 9.5px;
  color: var(--muted-soft);
  margin-top: 6px;
}
.amount-custom {
  grid-column: span 2;
  display: flex;
  align-items: center;
  background: var(--card);
  border: 1.5px solid var(--line);
  border-radius: 12px;
  padding: 4px 14px;
  transition: all 0.2s var(--ease);
}
.amount-custom:focus-within {
  border-color: var(--gold);
  background: linear-gradient(180deg, #FFFCF5 0%, #FFF8E8 100%);
  box-shadow: 0 0 0 3px rgba(201, 168, 76, 0.15);
}
.amount-custom-label {
  font-size: 12px;
  color: var(--muted);
  margin-left: 8px;
}
.amount-custom input {
  flex: 1;
  border: none;
  outline: none;
  background: transparent;
  font-family: var(--serif);
  font-size: 18px;
  font-weight: 500;
  color: var(--ink);
  padding: 10px 0;
  text-align: center;
  unicode-bidi: isolate;
  direction: ltr;
}

/* DURATION */
.duration-row {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 8px;
  margin-top: 12px;
  max-height: 0;
  opacity: 0;
  overflow: hidden;
  transition: all 0.4s var(--ease);
}
.duration-row.show {
  max-height: 220px;
  opacity: 1;
}
.duration-btn {
  background: var(--card);
  border: 1.5px solid var(--line);
  border-radius: 10px;
  padding: 9px 5px;
  cursor: pointer;
  transition: all 0.3s var(--ease);
  font-family: var(--sans);
  font-size: 11.5px;
  font-weight: 500;
  color: var(--ink);
  text-align: center;
  unicode-bidi: isolate;
}
.duration-btn:hover {
  border-color: var(--gold-soft);
  background: var(--bg-warm);
}
.duration-btn.selected {
  border-color: var(--gold);
  background: linear-gradient(180deg, #FFFCF5 0%, #FFF8E8 100%);
  color: var(--gold-deep);
}
.duration-row.has-selection .duration-btn:not(.selected) {
  transform: scale(0.94);
  opacity: 0.55;
}
.duration-custom {
  grid-column: span 4;
  display: flex;
  align-items: center;
  gap: 8px;
  border-radius: 10px;
  background: linear-gradient(180deg, #FFFCF5 0%, #FFF8E8 100%);
  border: 0 solid var(--gold);
  max-height: 0;
  opacity: 0;
  overflow: hidden;
  padding: 0 14px;
  transition: all 0.3s var(--ease);
}
.duration-custom.show {
  max-height: 60px;
  opacity: 1;
  padding: 8px 14px;
  border-width: 1.5px;
}
.duration-custom label {
  font-size: 12px;
  color: var(--ink-soft);
  white-space: nowrap;
}
.duration-custom input {
  flex: 1;
  border: none;
  outline: none;
  background: transparent;
  font-family: var(--serif);
  font-size: 16px;
  font-weight: 600;
  color: var(--ink);
  padding: 4px 0;
  text-align: center;
  direction: ltr;
}

/* PERSUASION */
.persuasion {
  background: linear-gradient(135deg, #FFFAEC 0%, #FFF4D6 100%);
  border-radius: 12px;
  margin-top: 14px;
  display: flex;
  gap: 10px;
  align-items: flex-start;
  max-height: 0;
  opacity: 0;
  overflow: hidden;
  border: 0 solid var(--gold-soft);
  padding: 0 14px;
  transition: all 0.4s var(--ease);
}
.persuasion.show {
  max-height: 240px;
  opacity: 1;
  padding: 12px 14px;
  border-width: 1px;
}
.persuasion-icon {
  flex-shrink: 0;
  width: 22px;
  height: 22px;
  border-radius: 50%;
  background: var(--gold);
  color: white;
  display: grid;
  place-items: center;
  font-size: 14px;
  font-weight: 700;
  font-family: var(--serif);
}
.persuasion-text {
  flex: 1;
  font-size: 12.5px;
  line-height: 1.65;
  color: var(--ink-soft);
}
.persuasion-text strong {
  color: var(--burgundy);
  font-weight: 600;
  unicode-bidi: isolate;
}
.persuasion-action {
  display: inline-block;
  margin-top: 10px;
  color: var(--gold-deep);
  font-weight: 600;
  font-size: 13px;
  cursor: pointer;
  text-decoration: none;
  padding: 6px 14px;
  border-radius: 8px;
  background: rgba(255, 255, 255, 0.6);
  border: 1px solid var(--gold-soft);
  transition: all 0.25s var(--ease);
  animation: breathe 2.4s ease-in-out infinite;
}
.persuasion-action:hover {
  color: var(--burgundy);
  border-color: var(--burgundy);
  background: rgba(255, 255, 255, 0.9);
  animation-play-state: paused;
}
@keyframes breathe {
  0%, 100% { transform: scale(1); box-shadow: 0 0 0 rgba(201, 168, 76, 0); }
  50% { transform: scale(1.025); box-shadow: 0 2px 8px rgba(201, 168, 76, 0.2); }
}


/* STEP 3: DETAILS */
.details-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
}
.field { display: flex; flex-direction: column; }
.field.full { grid-column: span 2; }
.field-label {
  font-size: 11.5px;
  color: var(--ink-soft);
  margin-bottom: 5px;
  font-weight: 500;
}
.field-label .optional {
  color: var(--muted);
  font-weight: 400;
  font-size: 10.5px;
  margin-right: 4px;
}
.field input, .field textarea {
  width: 100%;
  padding: 11px 14px;
  border: 1.5px solid var(--line);
  border-radius: 10px;
  font-family: var(--sans);
  font-size: 15px;
  font-weight: 400;
  color: var(--ink);
  background: var(--card);
  transition: all 0.2s var(--ease);
  outline: none;
}
.field input[dir="ltr"] { text-align: left; }
.field input:focus, .field textarea:focus {
  border-color: var(--gold);
  background: linear-gradient(180deg, #FFFCF5 0%, #FFF8E8 100%);
  box-shadow: 0 0 0 3px rgba(201, 168, 76, 0.15);
}
.field input.error {
  border-color: var(--burgundy-soft);
  box-shadow: 0 0 0 3px rgba(139, 26, 26, 0.08);
}
.field-hint {
  font-size: 10.5px;
  color: var(--muted);
  margin-top: 4px;
  line-height: 1.4;
}
.live-msg {
  font-size: 12px;
  margin-top: 8px;
  border-radius: 8px;
  background: var(--bg-warm);
  border-right: 0 solid var(--gold);
  color: var(--ink-soft);
  line-height: 1.5;
  max-height: 0;
  opacity: 0;
  overflow: hidden;
  padding: 0 12px;
  transition: all 0.35s var(--ease);
  grid-column: span 2;
}
.live-msg.show {
  max-height: 100px;
  opacity: 1;
  padding: 8px 12px;
  border-right-width: 2px;
}
.live-msg strong {
  color: var(--ink);
  font-weight: 600;
  unicode-bidi: isolate;
}
.live-msg.warn {
  background: #FBF3E8;
  border-right-color: var(--gold-deep);
  color: var(--ink-soft);
}

/* OTHER RECIPIENT */
.other-recipient {
  grid-column: span 2;
  margin-top: 6px;
  border-top: 1px dashed var(--line);
  padding-top: 14px;
}
.checkbox-row {
  display: flex;
  align-items: center;
  gap: 10px;
  cursor: pointer;
  user-select: none;
  padding: 6px 8px;
  margin: -6px -8px;
  border-radius: 8px;
  transition: background 0.2s var(--ease);
}
.checkbox-row:hover { background: var(--bg-warm); }
.checkbox-row input[type="checkbox"] {
  width: 18px;
  height: 18px;
  accent-color: var(--gold);
  cursor: pointer;
  flex-shrink: 0;
}
.checkbox-row label {
  font-size: 13px;
  color: var(--ink);
  cursor: pointer;
  font-weight: 500;
}
.checkbox-row label .small {
  display: block;
  font-size: 11px;
  color: var(--muted);
  font-weight: 400;
  margin-top: 1px;
}
.other-fields {
  max-height: 0;
  opacity: 0;
  overflow: hidden;
  margin-top: 0;
  transition: all 0.5s var(--ease);
}
.other-fields.show {
  max-height: 800px;
  opacity: 1;
  margin-top: 14px;
}
.recipient-type {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 8px;
  margin-bottom: 12px;
}
.recipient-type-btn {
  background: var(--card);
  border: 1.5px solid var(--line);
  border-radius: 10px;
  padding: 10px;
  font-family: var(--sans);
  font-size: 12.5px;
  font-weight: 500;
  color: var(--ink);
  cursor: pointer;
  transition: all 0.2s var(--ease);
}
.recipient-type-btn:hover {
  border-color: var(--gold-soft);
  background: var(--bg-warm);
}
.recipient-type-btn.selected {
  border-color: var(--gold);
  background: linear-gradient(180deg, #FFFCF5 0%, #FFF8E8 100%);
  color: var(--gold-deep);
}
.basic-fields-collapse {
  transition: all 0.5s var(--ease);
}
.basic-fields-collapse.collapsed {
  max-height: 0;
  opacity: 0;
  margin: 0;
  padding: 0;
  overflow: hidden;
  pointer-events: none;
}
.collapsed-summary {
  background: var(--bg-warm);
  border-radius: 10px;
  padding: 10px 14px;
  margin-bottom: 12px;
  border: 1px solid var(--line);
  display: none;
  font-size: 12.5px;
  color: var(--ink-soft);
  align-items: center;
  justify-content: space-between;
  gap: 10px;
}
.collapsed-summary.show { display: flex; }
.collapsed-summary .name {
  font-weight: 600;
  color: var(--ink);
}
.collapsed-summary button {
  background: transparent;
  border: none;
  color: var(--gold-deep);
  font-size: 11.5px;
  cursor: pointer;
  font-family: var(--sans);
  text-decoration: underline;
  text-decoration-color: var(--gold-soft);
  padding: 0;
}
textarea.notes-field {
  resize: vertical;
  min-height: 60px;
  font-family: var(--sans);
}

/* PAYMENT */
.summary {
  background: var(--bg-warm);
  border-radius: 12px;
  padding: 12px 14px;
  margin-bottom: 14px;

.summary-value {

}

  padding: 9px 12px;

  font-size: 11px;
  color: var(--ink-soft);

.payment-options {

.pay-btn {

.pay-card {

  border-color: var(--gold-soft);
  background: var(--bg-warm);
}

  gap: 12px;

}
.btn-back {

.btn-next {

  font-family: var(--sans);
  font-size: 13.5px;

.btn-next:disabled {
  opacity: 0.4;
  cursor: not-allowed;
  box-shadow: none;
}
.btn-next .arrow {
  display: inline-block;
  transition: transform 0.2s var(--ease);
}
.btn-next:hover:not(:disabled) .arrow {
  transform: translateX(-3px);
}
